<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 의약품 AR 도우미 (최종 마스터본)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; font-family: -apple-system, sans-serif; background-color: #121212; color: #fff; overflow: hidden; }
        
        .app-container { position: relative; width: 100%; height: calc(100% - 70px); }
        .view { display: none; width: 100%; height: 100%; flex-direction: column; overflow-y: auto; padding-bottom: 20px; }
        .view.active { display: flex; }

        /* 설정 바 (API 키 및 음성 속도 조절 통합) */
        .setting-bar { position: absolute; top: 0; left: 0; width: 100%; background: rgba(34, 34, 34, 0.95); padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 200; border-bottom: 1px solid #333; backdrop-filter: blur(5px); }
        .key-row { display: flex; justify-content: center; gap: 10px; width: 100%; }
        .key-row input { padding: 8px 12px; width: 60%; max-width: 250px; background: #333; border: 1px solid #555; color: white; border-radius: 20px; font-size: 0.9rem; outline: none; }
        .key-row button { padding: 8px 15px; background: #4CAF50; border: none; color: white; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold; }
        
        /* 음성 속도 조절 영역 */
        .speed-row { display: flex; align-items: center; gap: 10px; justify-content: center; width: 100%; font-size: 0.85rem; color: #aaa; }
        .speed-row input[type="range"] { width: 120px; accent-color: #4CAF50; cursor: pointer; }

        #view-camera { padding-top: 85px; flex-direction: column; overflow: hidden; }
        
        .camera-wrapper { position: relative; width: 100%; height: 40%; background: #000; flex-shrink: 0; border-bottom: 2px solid #333; }
        #video-element { width: 100%; height: 100%; object-fit: cover; }
        
        .ai-capture-btn { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); z-index: 10; padding: 15px 30px; background: #03a9f4; color: #fff; border: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(3, 169, 244, 0.5); white-space: nowrap; transition: 0.2s; border: 2px solid #fff; }
        .ai-capture-btn:active { transform: translate(-50%, 5px); }
        .ai-capture-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; border-color: #777; }

        .top-info-panel { width: 100%; height: 60%; padding: 35px 15px 15px 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; background: #121212; }
        .info-box { background: #1e1e1e; padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* 헤더(제목과 버튼들) 정렬 통일 */
        .box-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 12px; gap: 10px; }
        .box-header h3, .box-header h2 { font-size: 1.2rem; color: #4CAF50; margin: 0; }
        
        .warning-text { color: #ff5252; font-weight: bold; background: rgba(255, 82, 82, 0.1); padding: 8px 12px; border-radius: 8px; display: block; margin-top: 10px; border: 1px solid rgba(255, 82, 82, 0.3); line-height: 1.5; }

        #view-search { align-items: center; padding-top: 100px; }
        .search-container { width: 90%; max-width: 800px; margin-top: 20px; }
        .search-input { width: 100%; padding: 18px 24px; border-radius: 30px; border: 2px solid #333; font-size: 1rem; background: #252525; color: white; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: #4CAF50; box-shadow: 0 0 10px rgba(76, 175, 80, 0.2); }

        .content-card { width: 90%; max-width: 800px; background: #1e1e1e; border-radius: 16px; padding: 25px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .content-card p { line-height: 1.6; color: #ddd; margin-bottom: 12px; white-space: pre-wrap; }
        
        .contra-section { margin-top: 20px; padding-top: 20px; border-top: 1px dashed #555; }
        .contra-section h4 { color: #ff9800; margin-bottom: 12px; font-size: 1.1rem; display: flex; align-items: center; gap: 5px; }
        .contra-list { list-style: none; padding: 0; }
        .contra-list li { background: rgba(255, 152, 0, 0.1); color: #ffb74d; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; font-size: 0.95rem; border: 1px solid rgba(255, 152, 0, 0.2); line-height: 1.4; }

        /* 음성 및 즐겨찾기 버튼 */
        .btn-group { display: flex; gap: 10px; align-items: center; }
        .btn-star { background: none; border: none; font-size: 2rem; color: #555; cursor: pointer; transition: 0.2s; }
        .btn-star.saved { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .btn-tts { background: #4CAF50; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .btn-tts:active { background: #388E3C; }

        #view-favorites { align-items: center; padding-top: 100px; }
        .fav-header { width: 90%; max-width: 800px; margin-top: 10px; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .fav-list { width: 90%; max-width: 800px; display: flex; flex-direction: column; gap: 15px; }
        .fav-item { background: #2a2a2a; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #4CAF50; box-shadow: 0 4px 6px rgba(0,0,0,0.3); overflow: hidden; }
        .fav-item-content { flex: 1; padding: 20px; cursor: pointer; transition: background 0.2s; }
        .fav-item-content:hover { background: #333; }
        .fav-item-actions { padding: 20px; }
        .fav-item .btn-remove { background: #ff5252; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: #1a1a1a; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); z-index: 100; border-top: 1px solid #333; }
        .nav-item { flex: 1; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #888; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .nav-item span { font-size: 0.8rem; margin-top: 5px; font-weight: bold; }
        .nav-item svg { width: 26px; height: 26px; fill: currentColor; }
        .nav-item.active { color: #03a9f4; }

        .loading { display: none; color: #03a9f4; font-weight: bold; margin-top: 10px; text-align: center; padding: 10px; background: rgba(3, 169, 244, 0.1); border-radius: 8px; }

        @media (min-width: 768px) {
            #view-camera { flex-direction: row; align-items: stretch; padding-top: 85px; }
            .camera-wrapper { width: 50%; height: 100%; border-bottom: none; border-right: 2px solid #333; }
            .ai-capture-btn { bottom: 30px; }
            .top-info-panel { width: 50%; height: 100%; padding: 25px; }
        }
    </style>
</head>
<body>

<div class="setting-bar">
    <div class="key-row">
        <input type="password" id="api-key-input" placeholder="Google AI API Key 입력">
        <button onclick="saveApiKey()">키 저장</button>
    </div>
    <div class="speed-row">
        <span>🔊 음성 속도: </span>
        <input type="range" id="tts-speed" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSpeedLabel(this.value)">
        <span id="speed-val">1.0배속</span>
    </div>
</div>

<div class="app-container">
    
    <div id="view-camera" class="view active">
        <div class="camera-wrapper">
            <video id="video-element" autoplay playsinline muted></video>
            <button id="capture-btn" class="ai-capture-btn" onclick="analyzeImageWithAI()">📷 스마트 인식 (AI 분석)</button>
        </div>
        
        <div class="top-info-panel">
            <div id="camera-loading" class="loading">최적의 AI 모델을 찾아 약품을 분석 중입니다... 🧠</div>
            <div class="info-box">
                <div class="box-header">
                    <h3 style="color:#03a9f4;">💊 인식 약품 정보</h3>
                </div>
                <p id="cam-res-name" style="color:#aaa;">카메라를 약품에 맞추고 중앙의 파란 버튼을 누르세요.</p>
            </div>
            <div class="info-box">
                <div class="box-header">
                    <h3>📖 상세 의료 매뉴얼</h3>
                    <div class="btn-group">
                        <button class="btn-tts" onclick="speakCurrentInfo()">🔊 듣기</button>
                        <button class="btn-star" id="cam-star" onclick="toggleFavoriteFromCurrent('cam')">☆</button>
                    </div>
                </div>
                <div id="cam-res-manual" style="color:#aaa;">인식 대기 중...</div>
            </div>
        </div>
    </div>
    
    <div id="view-search" class="view">
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="약품명, 성분명, 증상 입력 후 엔터 (예: 타이레놀)" onkeypress="handleSearch(event)">
        </div>
        <div id="search-loading" class="loading">의약품 정보를 조회하고 있습니다... 🔍</div>

        <div class="content-card" id="search-result" style="display:none;">
            <div class="box-header">
                <h2 id="search-res-title">약품명</h2>
                <div class="btn-group">
                    <button class="btn-tts" onclick="speakCurrentInfo()">🔊 듣기</button>
                    <button class="btn-star" id="search-star" onclick="toggleFavoriteFromCurrent('search')">☆</button>
                </div>
            </div>
            <div id="search-res-manual"></div>
        </div>
    </div>

    <div id="view-favorites" class="view">
        <div class="fav-header">
            <h2 style="color:#ffd700;">⭐ 내 즐겨찾기 저장소</h2>
            <p style="color:#aaa; font-size:0.9rem; margin-top:5px;">목록을 터치하면 상세 정보를 다시 검색합니다.</p>
        </div>
        <div class="fav-list" id="fav-list-container"></div>
    </div>

</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="navigate('camera', this)" id="nav-camera">
        <svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
        <span>카메라</span>
    </div>
    <div class="nav-item" onclick="navigate('search', this)" id="nav-search">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <span>검색</span>
    </div>
    <div class="nav-item" onclick="navigate('favorites', this)" id="nav-fav">
        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        <span>즐겨찾기</span>
    </div>
</nav>

<canvas id="hidden-canvas" style="display:none;"></canvas>

<script>
    let currentData = { name: '', desc: '' };
    let currentJsonInfo = null; 

    window.onload = function() {
        const savedKey = localStorage.getItem('gemini_api_key');
        if(savedKey) { document.getElementById('api-key-input').value = savedKey; }
        startCamera();
        renderFavorites();
    }
    
    function saveApiKey() {
        const key = document.getElementById('api-key-input').value.trim();
        localStorage.setItem('gemini_api_key', key);
        alert('API Key가 기기 저장소에 안전하게 저장되었습니다.');
    }
    
    function getApiKey() { return localStorage.getItem('gemini_api_key'); }

    // 슬라이더 조절 시 글자 실시간 변경
    function updateSpeedLabel(val) {
        document.getElementById('speed-val').innerText = val + "배속";
    }

    function navigate(viewName, element) {
        window.speechSynthesis.cancel(); 
        document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
        document.getElementById(`view-${viewName}`).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');
        if(viewName === 'favorites') renderFavorites();
    }

    const videoElement = document.getElementById('video-element');
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            videoElement.srcObject = stream;
        } catch (err) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                videoElement.srcObject = stream;
            } catch (err2) {}
        }
    }

    const systemPrompt = `당신은 전문 약사 AI입니다. 요청하는 의약품을 분석하여 반드시 아래의 JSON 형식으로만 응답해주세요.
    형식:
    { "name": "약품명", "category": "효능 분류", "efficacy": "핵심 효능", "usage": "정확한 용법", "warning": "알레르기 반응 및 주의사항 (상세히)", "contraindications": ["병용 금기 약품 1", "병용 금기 약품 2"] }`;

    async function autoDetectModel(apiKey) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;
        const response = await fetch(url);
        const data = await response.json();
        if (data.error) throw new Error(`API 키 오류: ${data.error.message}`);
        if (data.models && data.models.length > 0) {
            const supported = data.models.filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent"));
            let bestModel = supported.find(m => m.name.includes("flash")) || supported.find(m => m.name.includes("vision")) || supported[0]; 
            return bestModel.name.replace("models/", "");
        }
        throw new Error("연결된 모델을 찾을 수 없습니다.");
    }

    async function analyzeImageWithAI() {
        const apiKey = getApiKey();
        if(!apiKey) return alert('화면 상단에 API Key를 먼저 저장해주세요.');
        window.speechSynthesis.cancel();

        document.getElementById('camera-loading').style.display = 'block';
        document.getElementById('capture-btn').disabled = true;

        const canvas = document.getElementById('hidden-canvas');
        canvas.width = videoElement.videoWidth || 640;
        canvas.height = videoElement.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
        
        const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];
        
        try {
            const exactModelName = await autoDetectModel(apiKey);
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${exactModelName}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [ { text: "이미지 속 의료품을 인식해서 정보를 제공해줘. " + systemPrompt }, { inlineData: { mimeType: "image/jpeg", data: base64Image } } ] }]
            };

            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const result = await response.json();
            if (result.error) throw new Error(result.error.message);
            
            const aiText = result.candidates[0].content.parts[0].text.trim();
            const jsonMatch = aiText.match(/\{[\s\S]*\}/);
            const drugInfo = JSON.parse(jsonMatch[0]);
            displayData('cam', drugInfo);
        } catch (err) {
            alert("사진 인식 오류: " + err.message);
        } finally {
            document.getElementById('camera-loading').style.display = 'none';
            document.getElementById('capture-btn').disabled = false;
        }
    }

    async function handleSearch(event) {
        if (event && event.key && event.key !== 'Enter') return;
        const apiKey = getApiKey();
        if(!apiKey) return alert('화면 상단에 API Key를 먼저 저장해주세요.');

        const query = document.getElementById('search-input').value;
        if(!query.trim()) return;
        window.speechSynthesis.cancel();

        document.getElementById('search-loading').style.display = 'block';
        document.getElementById('search-result').style.display = 'none';

        try {
            const exactModelName = await autoDetectModel(apiKey);
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${exactModelName}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: `'${query}' 에 대한 의약품 정보를 찾아줘. ` + systemPrompt }] }]
            };

            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const result = await response.json();
            if (result.error) throw new Error(result.error.message);
            
            const aiText = result.candidates[0].content.parts[0].text.trim();
            const jsonMatch = aiText.match(/\{[\s\S]*\}/);
            const drugInfo = JSON.parse(jsonMatch[0]);
            displayData('search', drugInfo);
        } catch (err) {
            alert("검색 오류: " + err.message);
        } finally {
            document.getElementById('search-loading').style.display = 'none';
        }
    }

    function displayData(type, info) {
        currentData = { name: info.name, desc: info.category };
        currentJsonInfo = info; 
        
        let contrasHTML = '';
        if(info.contraindications && info.contraindications.length > 0 && info.contraindications[0] !== "") {
            info.contraindications.forEach(c => { contrasHTML += `<li>💊 ${c}</li>`; });
        } else { contrasHTML = '<li>특이 병용 금기 사항 없음</li>'; }

        const htmlContent = `
            <p style="color:#fff;"><strong>🏷️ 분류:</strong> ${info.category}</p>
            <p style="color:#fff;"><strong>✨ 효능:</strong> ${info.efficacy}</p>
            <p style="color:#fff;"><strong>🕒 용법:</strong> ${info.usage}</p>
            <div class="warning-text">
                🚨 알레르기 및 부작용 주의사항<br>
                <span style="color:#fff; font-weight:normal;">${info.warning}</span>
            </div>
            <div class="contra-section">
                <h4>⛔ 병용 금기 및 주의 의약품</h4>
                <ul class="contra-list">${contrasHTML}</ul>
            </div>
        `;
        
        if(type === 'cam') {
            document.getElementById('cam-res-name').innerHTML = `<strong>${info.name}</strong><br><span style="font-size:0.9rem; color:#aaa;">${info.category}</span>`;
            document.getElementById('cam-res-manual').innerHTML = htmlContent;
            document.getElementById('cam-star').innerText = checkSaved(info.name) ? "★" : "☆";
            document.getElementById('cam-star').className = checkSaved(info.name) ? "btn-star saved" : "btn-star";
        } else {
            document.getElementById('search-res-title').innerText = info.name;
            document.getElementById('search-res-manual').innerHTML = htmlContent;
            document.getElementById('search-star').innerText = checkSaved(info.name) ? "★" : "☆";
            document.getElementById('search-star').className = checkSaved(info.name) ? "btn-star saved" : "btn-star";
            document.getElementById('search-result').style.display = 'block';
        }
    }

    // 🔊 음성 읽어주기
    function speakCurrentInfo() {
        if (!currentJsonInfo || !currentJsonInfo.name) return alert("읽어드릴 의약품 정보가 없습니다.");
        window.speechSynthesis.cancel();

        let speechText = `조회하신 약품명은 ${currentJsonInfo.name} 입니다. 효능은 ${currentJsonInfo.efficacy} 입니다. 용법은 ${currentJsonInfo.usage} 입니다. 주의사항입니다. ${currentJsonInfo.warning} `;
        if (currentJsonInfo.contraindications && currentJsonInfo.contraindications.length > 0 && currentJsonInfo.contraindications[0] !== "") {
            speechText += `금기 약품은 ${currentJsonInfo.contraindications.join(', ')} 입니다.`;
        }

        const utterance = new SpeechSynthesisUtterance(speechText);
        utterance.lang = 'ko-KR';
        
        const selectedSpeed = parseFloat(document.getElementById('tts-speed').value);
        utterance.rate = selectedSpeed; 
        
        window.speechSynthesis.speak(utterance);
    }

    function getFavorites() { return JSON.parse(localStorage.getItem('med_favorites')) || []; }
    function checkSaved(name) { return getFavorites().some(item => item.name === name); }
    
    function toggleFavoriteFromCurrent(type) {
        if(!currentData.name) return;
        toggleFavorite(currentData.name, currentData.desc, document.getElementById(`${type}-star`));
    }
    
    function toggleFavorite(name, desc, btnElement) {
        let favorites = getFavorites();
        const exists = favorites.findIndex(item => item.name === name);
        if (exists > -1) {
            favorites.splice(exists, 1);
            btnElement.classList.remove('saved');
            btnElement.innerText = "☆";
        } else {
            favorites.push({ name: name, desc: desc });
            btnElement.classList.add('saved');
            btnElement.innerText = "★";
        }
        localStorage.setItem('med_favorites', JSON.stringify(favorites));
    }
    
    function renderFavorites() {
        const container = document.getElementById('fav-list-container');
        const favorites = getFavorites();
        container.innerHTML = '';
        if(favorites.length === 0) {
            container.innerHTML = '<p style="color:#aaa; text-align:center; margin-top:30px; line-height:1.6;">저장된 의약품이 없습니다.<br>검색이나 스캔 후 별(☆) 아이콘을 눌러 추가해보세요!</p>';
            return;
        }
        favorites.forEach(item => {
            const div = document.createElement('div');
            div.className = 'fav-item';
            div.innerHTML = `
                <div class="fav-item-content" onclick="searchFromFavorite('${item.name}')">
                    <h3 style="color:#4CAF50;">${item.name}</h3>
                    <p style="color:#aaa; font-size:0.9rem; margin-top:5px;">${item.desc}</p>
                </div>
                <div class="fav-item-actions">
                    <button class="btn-remove" onclick="removeFavorite('${item.name}')">삭제</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function searchFromFavorite(medName) {
        navigate('search', document.getElementById('nav-search'));
        document.getElementById('search-input').value = medName;
        handleSearch({ key: 'Enter' });
    }
    
    function removeFavorite(name) {
        let favorites = getFavorites();
        favorites = favorites.filter(item => item.name !== name);
        localStorage.setItem('med_favorites', JSON.stringify(favorites));
        renderFavorites();
        if(currentData.name === name) {
            if(document.getElementById('cam-star')) { document.getElementById('cam-star').innerText = "☆"; document.getElementById('cam-star').classList.remove('saved'); }
            if(document.getElementById('search-star')) { document.getElementById('search-star').innerText = "☆"; document.getElementById('search-star').classList.remove('saved'); }
        }
    }
</script>
</body>
</html>
